<style>
:root {
  --cream: #FFFEF8;
  --sand: #EDE6D6;
  --parchment: #F5F0E3;
  --ink: #252220;
  --ink-soft: #4A4540;
  --ink-muted: #7A756D;
  --ink-faint: #A8A29A;
  --gold: #B8965A;
  --gold-light: #D4B87A;
  
  /* 分類色 */
  --botany: #2D4A3E;
  --philosophy: #B8965A;
  --journey: #8B5A3C;
  --blending: #3D4A6B;
  
  --font-display: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
  --font-body: 'Noto Serif TC', Georgia, serif;
  --font-sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 17px; }
body { 
  font-family: var(--font-body); 
  background: var(--cream); 
  color: var(--ink); 
  line-height: 1.8;
  font-weight: 300;
}
a { color: inherit; text-decoration: none; }

/* ═══════════════════════════════════════
   NAV
   ═══════════════════════════════════════ */
.nav {
  padding: 28px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--sand);
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 100;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--ink);
}
.nav-logo span {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  margin-left: 12px;
}
.nav-subscribe {
  display: inline-block;
  padding: 10px 24px;
  background: var(--ink);
  color: var(--cream);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.12em;
  transition: all 0.3s;
}
.nav-subscribe:hover {
  background: var(--gold);
  color: var(--ink);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 24px;
}
.nav-link {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  transition: color 0.3s;
}
.nav-link:hover {
  color: var(--ink);
}

/* ═══════════════════════════════════════
   HERO
   ═══════════════════════════════════════ */
.hero {
  max-width: 960px;
  margin: 0 auto;
  padding: 80px 24px 60px;
  text-align: center;
}
.hero-eyebrow {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 0.1em;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 16px;
}
.hero-subtitle {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
}

/* ═══════════════════════════════════════
   AUTHOR SECTION
   ═══════════════════════════════════════ */
.author-section {
  max-width: 680px;
  margin: 0 auto 48px;
  padding: 32px 40px;
  background: var(--parchment);
  border-left: 3px solid var(--gold);
  display: flex;
  align-items: center;
  gap: 24px;
}
.author-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--sand);
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.3s;
}
.author-avatar:hover {
  transform: scale(1.05);
}
.author-name-link {
  text-decoration: none;
}
.author-name-link:hover .author-name {
  color: var(--gold);
}
.author-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.author-info {
  flex: 1;
}
.author-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--ink);
  margin-bottom: 6px;
  transition: color 0.3s;
}
.author-bio {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-muted);
  line-height: 1.7;
}
.author-cta {
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.1em;
  transition: all 0.3s;
  flex-shrink: 0;
}
.author-cta:hover {

  color: var(--cream);
}

/* ═══════════════════════════════════════
   CATEGORY TABS
   ═══════════════════════════════════════ */
.category-nav {
  max-width: 960px;

}
.category-tabs {

  justify-content: center;
}
.category-tab {

  font-size: 13px;
  font-weight: 400;

  color: var(--ink-muted);
  cursor: pointer;
  position: relative;
  transition: color 0.3s;
}
.category-tab:hover {
  color: var(--ink);
}
.category-tab.active {
  color: var(--ink);
}
.category-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--gold);
}

/* Sub-category */
.subcategory-nav {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px 24px;
  display: none;
  justify-content: center;
  gap: 8px;

}
.subcategory-nav.active {

}
.subcategory-chip {

  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 300;
  color: var(--ink-muted);

  transition: all 0.3s;
}
.subcategory-chip:hover,
.subcategory-chip.active {

  color: var(--gold);
}

/* ═══════════════════════════════════════
   NEW ARTICLE (Featured - Left Image, Right Text)
   ═══════════════════════════════════════ */
.section-header {

  margin: 0 auto;
  padding: 48px 24px 24px;
}
.section-label {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 16px;
}
.section-label::after {

  height: 1px;
  background: var(--sand);
}

.new-article {
  max-width: 960px;
  margin: 0 auto 48px;
  padding: 0 24px;
}
.new-article-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  background: var(--parchment);
  transition: transform 0.3s;
}
.new-article-card:hover {
  transform: translateY(-4px);
}
.new-article-image {
  aspect-ratio: 4/3;
  overflow: hidden;
}
.new-article-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(0.75) contrast(0.9);
  transition: transform 0.5s;
}
.new-article-card:hover .new-article-image img {
  transform: scale(1.03);
}
.new-article-content {
  padding: 40px 40px 40px 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.new-article-badges {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.badge {

  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.badge-new {
  background: var(--gold);
  color: var(--cream);
}
.badge-category {
  border: 1px solid var(--botany);

}
.badge-premium {

  color: var(--ink-muted);
}
.new-article-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 400;
  letter-spacing: 0.04em;
  line-height: 1.4;
  color: var(--ink);
  margin-bottom: 12px;
}
.new-article-subtitle {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 300;
  font-style: italic;
  color: var(--ink-muted);
  margin-bottom: 20px;
}
.new-article-excerpt {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink-soft);
  margin-bottom: 24px;
}
.new-article-meta {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}
.read-more {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.12em;

}

/* ═══════════════════════════════════════

}

}

}

  font-weight: 400;

@media (max-width: 768px) {

     JAVASCRIPT
     ═══════════════════════════════════════ -->
<script>
(function () {

  // ── 分類設定 ──────────────────────────────────
  const CAT = {
    botany:    { label: '植物誌',  color: '#2D4A3E' },
    journey:   { label: '產區尋香', color: '#8B5A3C' },
    philosophy:{ label: '香氣哲思', color: '#B8965A' },
    blending:  { label: '調香手記', color: '#3D4A6B' }
  };
  const IMAGE_BASE = 'https://feyond.muzen.store/images/';

  // ── 工具函數 ──────────────────────────────────
  function isNew(dateStr) {
    return (new Date() - new Date(dateStr)) / 86400000 <= 30;
  }

  function catBadge(category) {
    const c = CAT[category] || { label: category, color: '#7A756D' };
    return `<span class="badge badge-category" style="border-color:${c.color};color:${c.color};">${c.label}</span>`;
  }

  function premiumBadge(premium) {
    return premium ? `<span class="badge badge-premium">Premium</span>` : '';
  }

  function newBadge(dateStr) {
    return isNew(dateStr) ? `<span class="badge badge-new">New</span>` : '';
  }

  function href(article) {
    return article.file + (article.premium ? '?paywall=true' : '');
  }

  function imgSrc(image) {
    return image ? IMAGE_BASE + image : '';
  }

  // ── 最新文章卡片（大卡，左圖右文）──────────────
  function renderNew(article) {
    const img = imgSrc(article.image);
    const imgEl = img
      ? `<img src="${img}" alt="${article.title}">`
      : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#3D4A6B,#2C3A5A);"></div>`;
    if (article.locked) {
      return `
        <div class="new-article-card" style="cursor:default;"
             data-category="${article.category}" data-date="${article.date}">
          <div class="new-article-image">${imgEl}</div>
          <div class="new-article-content">
            <div class="new-article-badges">
              ${catBadge(article.category)}
              <span class="badge" style="border:1px solid #A8A29A;color:#A8A29A;">等候解鎖</span>
            </div>
            <h2 class="new-article-title">${article.title}</h2>
            ${article.subtitle ? `<p class="new-article-subtitle">${article.subtitle}</p>` : ''}
            <p class="new-article-excerpt">${article.excerpt}</p>
            <p class="new-article-meta">${article.date.replace(/-/g,'.')} · ${CAT[article.category]?.label || ''}</p>
          </div>
        </div>`;
    }
    return `
      <a href="${href(article)}" class="new-article-card"
         data-category="${article.category}" data-date="${article.date}">
        <div class="new-article-image">${imgEl}</div>
        <div class="new-article-content">
          <div class="new-article-badges">
            ${newBadge(article.date)}
            ${catBadge(article.category)}
            ${premiumBadge(article.premium)}
          </div>
          <h2 class="new-article-title">${article.title}</h2>
          ${article.subtitle ? `<p class="new-article-subtitle">${article.subtitle}</p>` : ''}

          <p class="new-article-meta">${article.date.replace(/-/g,'.')} · ${CAT[article.category]?.label || ''}</p>

  }

          <div class="featured-image">${imgEl}</div>

  // ── 所有文章列表項目 ──────────────────────────
  function renderListItem(article) {

  // ── 篩選邏輯 ──────────────────────────────────
  function filterByCategory(category) {
    // 最新文章
    const secNew = document.getElementById('section-new');
    const hdNew  = document.getElementById('header-new');
    const newCard = secNew.querySelector('[data-category]');
    const showNew = newCard && (category === 'all' || newCard.dataset.category === category);
    secNew.style.display = showNew ? '' : 'none';
    hdNew.style.display  = showNew ? '' : 'none';

    // 精選文章
    const secFeat = document.getElementById('section-featured');
    const hdFeat  = document.getElementById('header-featured');
    let visibleFeat = 0;
    secFeat.querySelectorAll('[data-category]').forEach(card => {
      const show = category === 'all' || card.dataset.category === category;
      card.style.display = show ? '' : 'none';
      if (show) visibleFeat++;
    });
    secFeat.style.display = visibleFeat > 0 ? '' : 'none';
    hdFeat.style.display  = visibleFeat > 0 ? '' : 'none';

    // 所有文章
    const secList = document.getElementById('section-list');
    const hdList  = document.getElementById('header-list');
    let visibleList = 0;
    secList.querySelectorAll('[data-category]').forEach(item => {
      const show = category === 'all' || item.dataset.category === category;
      item.style.display = show ? '' : 'none';
      if (show) visibleList++;
    });
    secList.style.display = visibleList > 0 ? '' : 'none';
    hdList.style.display  = visibleList > 0 ? '' : 'none';
  }

  // ── Tab 點擊 ──────────────────────────────────
  function initTabs() {
    const tabs = document.querySelectorAll('.category-tab');
    const subBotany  = document.getElementById('subcategory-botany');
    const subJourney = document.getElementById('subcategory-journey');

    tabs.forEach(tab => {
      tab.addEventListener('click', function () {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const category = this.dataset.category;
        subBotany.classList.toggle('active',  category === 'botany');
        subJourney.classList.toggle('active', category === 'journey');
        filterByCategory(category);
      });
    });

    // 子分類 chips
    document.querySelectorAll('.subcategory-chip').forEach(chip => {
      chip.addEventListener('click', function () {
        this.parentElement.querySelectorAll('.subcategory-chip')
          .forEach(s => s.classList.remove('active'));
        this.classList.add('active');
      });
    });
  }
