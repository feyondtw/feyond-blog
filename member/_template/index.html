<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../../style.css">
<style>
/* 會員頁專屬樣式 - 延續現有設計語言 */
.member-welcome {
  padding: 60px 48px 48px;
  text-align: center;
  background: var(--parchment, #F5F0E3);
}
.member-greeting {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 13px;
  font-style: italic;
  letter-spacing: 0.2em;
  color: var(--gold, #B8965A);
  margin-bottom: 12px;
}
.member-title {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--ink, #252220);
}

.member-library {
  padding: 48px;
  max-width: 1000px;
  margin: 0 auto;
}

.library-section {
  margin-bottom: 56px;
}
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--sand, #EDE6D6);
}
.section-icon {
  font-size: 20px;
  opacity: 0.8;
}
.section-title {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--ink, #252220);
}
.section-title-en {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 12px;
  font-style: italic;
  letter-spacing: 0.1em;
  color: var(--ink-faint, #A8A29A);
}

.article-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.article-item {
  display: block;
  padding: 24px 28px;
  background: var(--parchment, #F5F0E3);
  border: 1px solid transparent;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
}
.article-item:hover {
  background: var(--cream, #FFFEF8);
  border-color: var(--gold, #B8965A);
}
.article-item-title {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--ink, #252220);
  line-height: 1.5;
  margin-bottom: 8px;
}
.article-item-meta {
  display: flex;
  gap: 16px;
  font-family: var(--font-sans, 'Noto Sans TC', sans-serif);
  font-size: 11px;
  color: var(--ink-faint, #A8A29A);
}
.article-item-new {
  color: var(--gold, #B8965A);
  font-weight: 400;
}

.member-nav {
  padding: 24px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--sand, #EDE6D6);
}
.nav-logo {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--ink, #252220);
  text-decoration: none;
}
.member-badge {
  display: flex;
  align-items: center;
  gap: 12px;
}
.member-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gold, #B8965A);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 14px;
  color: var(--cream, #FFFEF8);
}
.member-info { text-align: right; }
.member-name {
  font-family: var(--font-sans, 'Noto Sans TC', sans-serif);
  font-size: 13px;
  color: var(--ink-soft, #4A4540);
}
.member-status {
  font-family: var(--font-sans, 'Noto Sans TC', sans-serif);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--teal, #4A7C6F);
  text-transform: uppercase;
}

.member-footer {
  background: var(--ink, #252220);
  padding: 40px;
  text-align: center;
}
.footer-brand {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--cream, #FFFEF8);
  margin-bottom: 12px;
}
.footer-links {
  display: flex;
  justify-content: center;
  gap: 24px;
}
.footer-links a {
  font-family: var(--font-sans, 'Noto Sans TC', sans-serif);
  font-size: 12px;
  color: rgba(255,254,248,0.5);
  text-decoration: none;
  transition: color 0.3s;
}
.footer-links a:hover { color: var(--gold, #B8965A); }

@media (max-width: 768px) {
  .member-nav, .member-welcome, .member-library { 
    padding-left: 24px; 
    padding-right: 24px; 
  }
  .article-list { grid-template-columns: 1fr; }
}
</style>
</head>
