<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薜琉璃調香創作｜飛揚細籽 FEYOND</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFFEF8;
  --sand: #EDE6D6;
  --parchment: #F5F0E3;
  --ink: #252220;
  --ink-soft: #4A4540;
  --ink-muted: #7A756D;
  --ink-faint: #A8A29A;
  --gold: #B8965A;
  --gold-light: #D4B87A;

  /* 調香手記主題色 - 靛藍 + 琉璃光 */
  --blending: #3D4A6B;
  --lapis: #2C3A5A;
  --lapis-light: #5A6E9A;
  --lapis-mist: #E8EBF2;
  --lapis-pale: #F2F4F8;

  --font-display: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
  --font-body: 'Noto Serif TC', Georgia, serif;
  --font-sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 17px; }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  line-height: 2;
  font-weight: 300;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

/* NAV */
.nav {
  padding: 28px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--sand);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--ink);
}
.nav-back {
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  transition: color 0.3s;
}
.nav-back:hover { color: var(--ink); }

/* ARTICLE HEADER */
.article-header {
  max-width: 720px;
  margin: 0 auto;
  padding: 80px 24px 48px;
  text-align: center;
}
.article-category {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--blending);
  margin-bottom: 24px;
}
.article-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 46px);
  font-weight: 400;
  letter-spacing: 0.06em;
  line-height: 1.4;
  color: var(--ink);
  margin-bottom: 16px;
}
.article-subtitle {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  margin-bottom: 32px;
}
.article-meta {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
}

/* HERO IMAGE */
.article-hero {
  max-width: 960px;
  margin: 0 auto 80px;
  padding: 0 24px;
  position: relative;
}
.article-hero img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  filter: saturate(0.75) contrast(0.9);
}
.article-hero figcaption {
  margin-top: 12px;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--ink-faint);
  text-align: center;
  letter-spacing: 0.05em;
}

/* 琉璃光裝飾線 */
.lapis-rule {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blending), transparent);
  margin: 0 auto 48px;
  max-width: 480px;
  opacity: 0.4;
}

/* 梵文引題 */
.sanskrit-epigraph {
  max-width: 560px;
  margin: 0 auto 64px;
  padding: 32px 40px;
  background: var(--lapis-pale);
  border: 1px solid rgba(61, 74, 107, 0.15);
  text-align: center;
  position: relative;
}
.sanskrit-epigraph::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--blending);
}
.sanskrit-text {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--blending);
  margin-bottom: 12px;
}
.sanskrit-meaning {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  text-transform: uppercase;
}

/* INTRO（單欄開場）*/
.intro-section {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 60px;
}
.intro-section p {
  font-size: 1rem;
  font-weight: 300;
  line-height: 2.2;
  color: var(--ink-soft);
  margin-bottom: 1.8em;
  letter-spacing: 0.02em;
}
.intro-section p:first-of-type::first-letter {
  font-family: var(--font-display);
  font-size: 4em;
  float: left;
  line-height: 0.85;
  margin: 6px 16px 0 0;
  color: var(--blending);
  font-weight: 400;
}

/* TWO COLUMN */
.content-section {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

.two-col {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 60px;
  padding: 48px 0;
  border-top: 1px solid var(--sand);
}
.two-col:first-of-type {
  border-top: none;
  padding-top: 0;
}

/* 左欄 */
.col-left {
  position: sticky;
  top: 100px;
  align-self: start;
}
.col-left h2 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 0.06em;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 16px;
}
.col-left .summary {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}
.col-left .section-num {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: var(--blending);
  opacity: 0.6;
  margin-bottom: 8px;
}

/* 右欄 */
.col-right p {
  font-size: 1rem;
  font-weight: 300;
  line-height: 2.2;
  color: var(--ink-soft);
  margin-bottom: 1.8em;
  letter-spacing: 0.02em;
}
.col-right p:last-child { margin-bottom: 0; }

/* 引言 blockquote */
.col-right blockquote {
  margin: 2em 0;
  padding: 1.5em 2em;
  background: var(--lapis-pale);
  border-left: 3px solid var(--blending);
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-style: italic;
  line-height: 2;
  color: var(--lapis);
}
.col-right blockquote cite {
  display: block;
  margin-top: 12px;
  font-size: 12px;
  font-style: normal;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}

/* 三大困境列表樣式 */
.issue-list {
  margin: 1.5em 0;
  padding: 0;
  list-style: none;
}
.issue-list li {
  padding: 16px 0 16px 24px;
  border-top: 1px solid var(--sand);
  font-size: 0.95rem;
  font-weight: 300;
  line-height: 1.9;
  color: var(--ink-soft);
  letter-spacing: 0.02em;
  position: relative;
}
.issue-list li:last-child {
  border-bottom: 1px solid var(--sand);
}
.issue-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 6px;
  height: 6px;
  background: var(--blending);
  border-radius: 50%;
  opacity: 0.5;
  transform: translateY(-50%);
}

/* 寬幅引言 */
.wide-quote {
  max-width: 680px;
  margin: 40px auto 60px;
  padding: 0 24px;
  border-left: 3px solid var(--blending);
  padding-left: 32px;
}
.wide-quote p {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-style: italic;
  line-height: 2;
  color: var(--lapis);
  font-weight: 300;
}

/* 藥師十二大願裝飾區塊 */
.dharma-block {
  max-width: 680px;
  margin: 48px auto;
  padding: 40px 48px;
  background: linear-gradient(135deg, var(--lapis-pale) 0%, rgba(61,74,107,0.04) 100%);
  border: 1px solid rgba(61, 74, 107, 0.2);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.dharma-block::before {
  content: '藥師琉璃光如來';
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--cream);
  padding: 0 16px;
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--blending);
}
.dharma-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--blending);
  margin-bottom: 16px;
}
.dharma-body {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 2;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}

/* 全幅圖 */
.img-full {
  max-width: 960px;
  margin: 40px auto 60px;
  padding: 0 24px;
}
.img-full img {
  width: 100%;
  filter: saturate(0.75) contrast(0.9);
}
.img-full figcaption {
  margin-top: 12px;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--ink-faint);
  text-align: center;
  letter-spacing: 0.05em;
}

/* 雙圖並排 */
.img-pair {
  max-width: 960px;
  margin: 40px auto 60px;
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.img-pair img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  filter: saturate(0.75) contrast(0.9);
}

/* ARTICLE FOOTER */
.article-footer {
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 24px 64px;
  border-top: 1px solid var(--sand);
  text-align: center;
}
.article-footer .closer {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 16px;
  color: var(--ink-muted);
  margin-bottom: 12px;
}
.article-footer .product-note {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  margin-bottom: 40px;
}
.back-link {
  display: inline-block;
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blending);
  padding: 14px 36px;
  border: 1px solid var(--blending);
  transition: all 0.3s;
}
.back-link:hover {
  background: var(--blending);
  color: var(--cream);
}

/* SITE FOOTER */
.site-footer {
  background: var(--ink);
  padding: 56px 24px;
  text-align: center;
}
.footer-brand {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--cream);
  margin-bottom: 8px;
}
.footer-copy {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(255,254,248,0.4);
}

/* RWD */
@media (max-width: 768px) {
  html { font-size: 16px; }
  .nav { padding: 20px 24px; }
  .article-header { padding: 60px 20px 40px; }
  .article-title { font-size: 30px; }
  .two-col {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .col-left {
    position: static;
    border-bottom: 1px solid var(--sand);
    padding-bottom: 24px;
  }
  .img-pair { grid-template-columns: 1fr; }
  .dharma-block { padding: 32px 24px; }
  .wide-quote { padding-left: 24px; }
}

<!-- HEADER -->
<header class="article-header">
  <p class="article-category">調香創作 · Blending Notes</p>
  <h1 class="article-title">從企業修羅場到東方淨琉璃光</h1>
  <p class="article-subtitle">薜琉璃調香創作</p>
  <p class="article-meta">Feyond · 2025.11.16</p>
</header>

<!-- HERO IMAGE -->
<figure class="article-hero">
  <img src="https://feyond.muzen.store/images/薜 靛藍調油.jpg"
       alt="薜琉璃 LULU — 靛藍琉璃光精油">
  <figcaption>薜琉璃 LULU，靛藍色的油液流淌於法會的供養之間</figcaption>
</figure>

<!-- 梵文題辭 -->
<div style="max-width:960px;margin:0 auto;padding:0 24px;">
  <div class="sanskrit-epigraph">
    <p class="sanskrit-text">Vaidūrya · 薜琉璃</p>
    <p class="sanskrit-meaning">清淨、內外明澈的琉璃光 · 出自《藥師經》梵文讚詞</p>
  </div>
</div>

<!-- INTRO（單欄開場）-->
<section class="intro-section">
  <p>2025年菩薩寺藥師法會，「薜琉璃 LULU」有殊榮成為寺院的供養藥油，這是一件眾生歡喜的事。當靛藍的油液，在滿檔的廠務被臨時加開的半自動填充產線中流淌時，清淨與透澈的色澤顯得格外聖靜。</p>

  <p>「薜琉璃（Vaidurya）」的創作來源，擷取自《藥師經》中的梵文讚詞，意指清淨、內外明澈的琉璃光。然而，這瓶油誕生之前，卻正是我對芳療產業感到極度茫然、厭怠之時——那時經歷了家族最重要的至親友人離逝，在生命的重大疾病面前，我最熟悉的精油專業知識，卻有應用不上的束手無策與無力感。</p>
</section>

<!-- SECTION 1：寺院的供養與創作的掙扎 -->
<div class="content-section">

  <div class="two-col">
    <div class="col-left">
      <p class="section-num">— I —</p>
      <h2>寺院的供養<br>與創作的掙扎</h2>
      <p class="summary">當清淨的琉璃光在法會中流淌，它背後是調香師深重的茫然與痛苦。</p>
    </div>
    <div class="col-right">
      <p>這份痛苦，讓我不得不重新面對精油療癒觀的二大核心困境：</p>

      <ul class="issue-list">
        <li>一是科學與實踐的鴻溝——作為輔助療法，精油的藥學屬性在重大疾病嚴酷的病程前，除了單純的塗抺與擴香，是否已無其他更切實應用的可能？</li>
        <li>二是當精油化身為時下流行的心靈商品——當精油香氣被類化為另類的心靈符號，變成時下商業話題，是否也會失去療癒的嚴謹性？</li>
      </ul>

      <p>在生死的考驗下，我迫切需要向內尋求一種內外明澈的能量。在那之前，連譜香都觸焦。</p>
    </div>
  </div>

  <!-- SECTION 2：營運者的困局 -->
  <div class="two-col">
    <div class="col-left">
      <p class="section-num">— II —</p>
      <h2>營運者的困局<br>與娑婆世界的苦難</h2>
      <p class="summary">調香的茫然，與企業管理的現實困境交織，形成難解的雙重困局。</p>
    </div>
    <div class="col-right">
      <p>對精油調香創作的茫然，與我作為公司營運者的現實困境交織在一起。公司的管理在 SAP 導入之前一直是我的死穴。時代的進步讓新世代的勞工享受了前人爭取的勞權，但面對社會化應對的缺乏，卻常讓管理階層焦頭爛額地收拾爛攤。</p>

      <blockquote>
        務實的營運與形而上的靈性陷入混沌，我對自己「企業營運者」這個角色產生了複雜的交戰，曾經認為值得赴湯蹈火、至死不悔的「大業」，一度走入了死局，看到了盡頭的放棄念頭。
      </blockquote>

      <p>與此同時，我們的供應鏈也響起了共時性的警鐘：保加利亞的玫瑰精油、索馬利蘭的乳香與沒藥，同時出現艱苦局面。農工老的老，年輕人蹲不下身段做採集；氣候極端，讓植物遭寒或遇大雨而毀損或收成減少。儘管辛苦拼出的萃取物，讓產品價格奇高，卻沒人視為好差事。</p>

      <p>公司定位、管理、市場、供應鏈和資金運用，如何平衡？這些世間千萬個創業者共同的難題，精準數據和管理大師的經驗都無法全然解答。</p>
    </div>
  </div>

</div>

<!-- 雙圖：菩薩寺法會 + 靛藍調香 -->
<div class="img-pair">
  <figure>
    <img src="https://feyond.muzen.store/images/薜 菩薩寺.jpg" alt="菩薩寺藥師法會">
    <figcaption style="margin-top:8px;font-family:var(--font-sans);font-size:12px;color:var(--ink-faint);letter-spacing:0.05em;">菩薩寺藥師法會，薜琉璃成為供養的藥油</figcaption>
  </figure>
  <figure>
    <img src="https://feyond.muzen.store/images/薜 調香.jpg" alt="調香創作過程">
    <figcaption style="margin-top:8px;font-family:var(--font-sans);font-size:12px;color:var(--ink-faint);letter-spacing:0.05em;">創作過程中的調香工作，連譜香都曾觸焦</figcaption>
  </figure>
</div>

<!-- SECTION 3+4 -->
<div class="content-section">

  <div class="two-col">
    <div class="col-left">
      <p class="section-num">— III —</p>
      <h2>向大醫王<br>借取琉璃智慧</h2>
      <p class="summary">在世間的答案找不到時，循著遁世之道，埋首佛法空性智慧。</p>
      <figure style="margin-top:24px;">
        <img src="https://feyond.muzen.store/images/薜 佛圖.jpg"
             alt="藥師佛"
             style="width:100%;filter:saturate(0.75) contrast(0.9);">
      </figure>
    </div>
    <div class="col-right">
      <p>當世間的答案找不到時，我循著慣常的遁世方法，埋首於《金剛經》和《大般若經》的空性智慧中找尋安慰。佛經法意總能出奇不意的顯化出一些訊息。</p>

      <p>那段低谷，偶爾會拿起《藥師經》梵唄，我深深佩服這位「醫王」。究竟要洞察多深的人心，要具備多大的慈悲力，才能宏出十二道微妙殊勝的大願？</p>

      <blockquote>
        佛陀住世的年代，儘管科技與物質層面有著巨大差異，但精神與世俗煩惱的本質，卻有著驚人的相似度。佛言：「貪、瞋、癡」三毒，是所有煩惱的根源——這些內在的痛苦並未因科技進步而消失。
        <cite>— 《藥師本願功德經》</cite>
      </blockquote>

      <p>人生的「生、老、病、死」根本問題不變，人們對身心健康、內心安樂與清淨的追求，始終是永恆的祈願。</p>
    </div>
  </div>

  <!-- SECTION 4：解套之道 -->

      <h2>琉璃光中的<br>解套之道</h2>
      <p class="summary">藥師佛的十二大願，是以入世的務實，解套娑婆世界的事業難題。</p>
      <figure style="margin-top:24px;">
        <img src="https://feyond.muzen.store/images/薜 佛經法義.jpg"

    <div class="col-right">
      <p>昨天跟了一日的藥師懺，這場法會給信根淺薄的自己喚醒了新的提醒：藥師佛的十二大願，正是以入世的務實，解套娑婆世界的事業難題。</p>

      <p>苦難的表現形式雖隨時代而變——古代的貧病與現代的管理焦慮——但面對這些三毒與四苦，佛法的願力與智慧卻是永恆的解方。</p>

      <p>「薜琉璃」的精油，不再只是一瓶物質的芳香分子，它應是願力的載體：以大地的藥石，應對現世的困苦；以清淨的琉璃光，提醒營運者在混沌中，仍需保持內外明澈的覺知。</p>

      <p>這份智慧，正是讓我在放棄的盡頭，重拾本願的法藥。</p>
